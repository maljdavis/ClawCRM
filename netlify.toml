[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    # Restrict what resources the page can load — blocks injected scripts/iframes
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; connect-src 'self' https://*.supabase.co wss://*.supabase.co; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; frame-ancestors 'none';"
    # Prevent your app from being embedded in an iframe on another site
    X-Frame-Options = "DENY"
    # Stop browsers from guessing file types (helps prevent XSS via uploads)
    X-Content-Type-Options = "nosniff"
    # Don't send your Supabase URL to external sites via the Referer header
    Referrer-Policy = "same-origin"
    # Force HTTPS for 1 year
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

[[redirects]]
  # Send any path to the single HTML file (supports direct URL sharing)
  from = "/*"
  to   = "/index.html"
  status = 200
